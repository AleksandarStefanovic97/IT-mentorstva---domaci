<!doctype html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="stylesheet" type="text/css" href="/css/bootstrap.min.css" />
		<link rel="stylesheet" type="text/css" href="/css/style.css" />

		<script src="/js/bootstrap.min.js"></script>
	</head>

	<body>
		<div
			id="carouselExampleControls"
			class="carousel slide"
			data-ride="carousel"
		>
			<div class="carousel-inner">
				<div class="carousel-item active">
					<img
						class="d-block w-100"
						src="https://mediacloud.carbuyer.co.uk/image/private/s--X-WVjvBW--/f_auto,t_content-image-full-desktop@1/v1715268234/carbuyer/2024/05/BMW%205%20Series%20Carbuyer%20review-7.jpg"
						alt="First slide"
					/>
				</div>
				<div class="carousel-item">
					<img
						class="d-block w-100"
						src="https://www.mbusa.com/content/dam/mb-nafta/us/myco/my26/e-class/e-sedan/class-page/2026-E-SEDAN-HC-D.jpg"
						alt="Second slide"
					/>
				</div>
				<div class="carousel-item">
					<img
						class="d-block w-100"
						src="https://hips.hearstapps.com/hmg-prod/images/2020-lexus-gs-f-mmp-1-1580498320.jpg?crop=0.777xw:0.924xh;0.114xw,0.0759xh&resize=1200:*"
						alt="Third slide"
					/>
				</div>
			</div>
			<a
				class="carousel-control-prev"
				href="#carouselExampleControls"
				role="button"
				data-slide="prev"
			>
				<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				<span class="sr-only">Previous</span>
			</a>
			<a
				class="carousel-control-next"
				href="#carouselExampleControls"
				role="button"
				data-slide="next"
			>
				<span class="carousel-control-next-icon" aria-hidden="true"></span>
				<span class="sr-only">Next</span>
			</a>
		</div>

		<div class="container d-flex flex-wrap divHolder mt-5">
			<div
				class="text-light bg-dark col-10 d-flex align-items-center justify-content-center flex-column"
			>
				<p>Highly experienced developer</p>
				<button
					type="button"
					class="btn btn-primary"
					data-bs-toggle="modal"
					data-bs-target="#exampleModal"
				>
					About me!
				</button>
			</div>

			<div
				class="bg-info col-5 d-flex align-items-center justify-content-center"
			>
				HTML/CSS
			</div>

			<div
				class="bg-primary col-5 d-flex align-items-center justify-content-center"
			>
				Python
			</div>

			<div
				class="text-light bg-dark col-10 d-flex align-items-center justify-content-center"
			>
				Django
			</div>
		</div>
		<footer>
			<div
				class="text-center p-4"
				style="background-color: rgba(0, 0, 0, 0.05)"
			>
				© 2021 Copyright:
				<a class="text-reset fw-bold" href="https://mdbootstrap.com/"
					>MDBootstrap.com</a
				>
			</div>
		</footer>
		<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
		<!-- Modal -->
		<div
			class="modal fade"
			id="exampleModal"
			tabindex="-1"
			aria-labelledby="exampleModalLabel"
			aria-hidden="true"
		>
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h1 class="modal-title fs-5" id="exampleModalLabel">Pozdrav!</h1>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
							aria-label="Close"
						></button>
					</div>
					<div class="modal-body">Svasta nesto</div>
					<div class="modal-footer">
						<button
							type="button"
							class="btn btn-secondary"
							data-bs-dismiss="modal"
						>
							Zatvori
						</button>
						<button type="button" class="btn btn-primary">Ok!</button>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
